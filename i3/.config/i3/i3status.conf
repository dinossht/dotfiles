general {
    colors = true
    color_good = "#a6e3a1"
    color_degraded = "#f9e2af"
    color_bad = "#f38ba8"
    interval = 2
}

order += "wireless wlp9s0"
order += "ethernet enp8s0"
order += "cpu_usage"
order += "cpu_temperature 0"
order += "memory"
order += "disk /"
order += "volume master"
order += "battery 0"
order += "tztime local"

wireless wlp9s0 {
    format_up = "  %quality %essid"
    format_down = "  down"
}

ethernet enp8s0 {
    format_up = "  %ip"
    format_down = ""
}

cpu_usage {
    format = "  %usage"
}

cpu_temperature 0 {
    format = " %degrees°C"
    path = "/sys/class/thermal/thermal_zone0/temp"
    max_threshold = 85
}

memory {
    format = "  %used / %total"
    threshold_degraded = "4G"
    threshold_critical = "2G"
}

disk "/" {
    format = "  %avail"
}

volume master {
    format = " 󰕾 %volume"
    format_muted = " 󰖁 muted"
    device = "default"
    mixer = "Master"
    mixer_idx = 0
}

battery 0 {
    format = " %status %percentage %remaining"
    status_chr = "⚡"
    status_bat = ""
    status_full = ""
    low_threshold = 20
    threshold_type = "percentage"
    last_full_capacity = true
}

tztime local {
    format = "  %a %d %b  %H:%M"
}
