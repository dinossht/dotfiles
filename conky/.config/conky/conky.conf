conky.config = {
    alignment = 'top_right',
    background = true,
    border_width = 0,
    cpu_avg_samples = 2,
    default_color = 'white',
    default_outline_color = 'white',
    default_shade_color = 'black',
    double_buffer = true,
    draw_borders = false,
    draw_graph_borders = true,
    draw_outline = false,
    draw_shades = true,
    extra_newline = false,
    font = 'JetBrainsMono Nerd Font:size=9',
    gap_x = 30,
    gap_y = 50,
    minimum_height = 300,
    minimum_width = 280,
    maximum_width = 300,
    net_avg_samples = 2,
    no_buffers = true,
    out_to_console = false,
    out_to_stderr = false,
    own_window = true,
    own_window_class = 'Conky',
    own_window_type = 'desktop',
    own_window_transparent = false,
    own_window_argb_visual = true,
    own_window_argb_value = 180,
    own_window_colour = '0a0a0a',
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    show_graph_range = false,
    show_graph_scale = false,
    stippled_borders = 0,
    update_interval = 2.0,
    uppercase = false,
    use_spacer = 'none',
    use_xft = true,
    xftalpha = 0.9,
    color1 = '88c0d0',
    color2 = '5e81ac',
    color3 = 'a3be8c',
    color4 = 'ebcb8b',
    color5 = 'bf616a',
    color6 = '8fbcbb',
};

conky.text = [[
${color1}${font JetBrainsMono Nerd Font:bold:size=12}LEGION ${color6}${font JetBrainsMono Nerd Font:size=9}${nodename}
${color2}${hr 2}
${color1}${font JetBrainsMono Nerd Font:bold:size=10}CPU ${color6}${font}${alignr}${cpu cpu0}%
${color2}${cpubar cpu0 6}
${color6} 1 ${color3}${cpubar cpu1 6,55}  ${color6} 2 ${color3}${cpubar cpu2 6,55}  ${color6} 3 ${color3}${cpubar cpu3 6,55}  ${color6} 4 ${color3}${cpubar cpu4 6,55}
${color6} 5 ${color3}${cpubar cpu5 6,55}  ${color6} 6 ${color3}${cpubar cpu6 6,55}  ${color6} 7 ${color3}${cpubar cpu7 6,55}  ${color6} 8 ${color3}${cpubar cpu8 6,55}
${color6} 9 ${color3}${cpubar cpu9 6,55}  ${color6}10 ${color3}${cpubar cpu10 6,55}  ${color6}11 ${color3}${cpubar cpu11 6,55}  ${color6}12 ${color3}${cpubar cpu12 6,55}
${color6}Freq: ${color3}${freq_g}GHz${alignr}${color6}Temp: ${color3}${hwmon 2 temp 1}°C
${color6}Load: ${color3}${loadavg 1} ${loadavg 2} ${loadavg 3}${alignr}${color6}Procs: ${color3}${processes}
${color6}Top CPU:
${color3} ${top name 1}${alignr}${top cpu 1}%
${color3} ${top name 2}${alignr}${top cpu 2}%
${color3} ${top name 3}${alignr}${top cpu 3}%
${color2}${hr 2}
${color1}${font JetBrainsMono Nerd Font:bold:size=10}RAM ${color6}${font}${alignr}${mem} / ${memmax}
${color2}${membar 6}
${color6}Used: ${color3}${memperc}%${alignr}${color6}Buffers: ${color3}${buffers}
${color6}Top RAM:
${color3} ${top_mem name 1}${alignr}${top_mem mem_res 1}
${color3} ${top_mem name 2}${alignr}${top_mem mem_res 2}
${color3} ${top_mem name 3}${alignr}${top_mem mem_res 3}
${color2}${hr 2}
${color1}${font JetBrainsMono Nerd Font:bold:size=10}GPU ${color6}${font}${alignr}RTX 4060
${color6}Temp: ${color3}${nvidia temp}°C${alignr}${color6}Fan: ${color3}${nvidia fanlevel}%
${color6}GPU: ${color3}${nvidia gpuutil}%${alignr}${color6}VRAM: ${color3}${nvidia memused}/${nvidia memmax} MiB
${color2}${hr 2}
${color1}${font JetBrainsMono Nerd Font:bold:size=10}DISK ${font}
${color6}Root ${color3}${alignr}${fs_used /} / ${fs_size /}
${color2}${fs_bar 6 /}
${color6}SSD2 ${color3}${alignr}${fs_used /mnt/ssd2} / ${fs_size /mnt/ssd2}
${color2}${fs_bar 6 /mnt/ssd2}
${color6}Read: ${color3}${diskio_read nvme1n1}${alignr}${color6}Write: ${color3}${diskio_write nvme1n1}
${color2}${hr 2}
${color1}${font JetBrainsMono Nerd Font:bold:size=10}NET ${color6}${font}${alignr}${if_up wlp9s0}WiFi${else}Ethernet${endif}
${color6}IP: ${color3}${addr wlp9s0}${addr enp8s0}
${color6}Down: ${color3}${downspeed wlp9s0}${downspeed enp8s0}${alignr}${color6}Up: ${color3}${upspeed wlp9s0}${upspeed enp8s0}
${color2}${downspeedgraph wlp9s0 30,140 5e81ac a3be8c} ${alignr}${color2}${upspeedgraph wlp9s0 30,140 5e81ac bf616a}
${color6}Total: ${color3}${totaldown wlp9s0}${totaldown enp8s0}${alignr}${color6}Total: ${color3}${totalup wlp9s0}${totalup enp8s0}
${color2}${hr 2}
${color1}${font JetBrainsMono Nerd Font:bold:size=10}SYSTEM ${font}
${color6}Uptime: ${color3}${uptime}
${color6}Kernel: ${color3}${kernel}
${color6}Swap:   ${color3}${swap} / ${swapmax}
]];
