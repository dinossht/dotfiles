# ─── General ─────────────────────────────────────────────────────
linux_display_server auto

# ─── GPU Pinning (fix dotted screen on hybrid Intel/NVIDIA) ─────
env __NV_PRIME_RENDER_OFFLOAD=1
env __GLX_VENDOR_LIBRARY_NAME=nvidia


# ─── Fonts ────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0
disable_ligatures never

# ─── Bell ────────────────────────────────────────────────────────
enable_audio_bell no
visual_bell_duration 0

# ─── Cursor ──────────────────────────────────────────────────────
cursor_shape beam
cursor_beam_thickness 1.5
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0
cursor_trail 0

# ─── Scrollback ──────────────────────────────────────────────────
scrollback_lines 10000
scrollback_pager_history_size 4
wheel_scroll_multiplier 5.0
touch_scroll_multiplier 1.0

# ─── Mouse ───────────────────────────────────────────────────────
mouse_hide_wait 3.0
url_color #0087bd
url_style curly
open_url_with default
detect_urls yes
copy_on_select clipboard

# ─── Window Layout ───────────────────────────────────────────────
remember_window_size yes
enabled_layouts Tall, Splits, Fat, Grid, Stack
window_border_width 1pt
active_border_color #44ffff
inactive_border_color #555555
window_padding_width 6
window_margin_width 0
placement_strategy center
confirm_os_window_close -1

# ─── Tab Bar ─────────────────────────────────────────────────────
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_align left
tab_bar_min_tabs 2
tab_title_template " {index}: {title} "
active_tab_foreground   #1e1e2e
active_tab_background   #89b4fa
active_tab_font_style   bold
inactive_tab_foreground #cdd6f4
inactive_tab_background #313244
inactive_tab_font_style normal

# ─── Color Scheme (Catppuccin Mocha inspired) ────────────────────
foreground #cdd6f4
background #1e1e2e

# Black
color0  #45475a
color8  #585b70
# Red
color1  #f38ba8
color9  #f38ba8
# Green
color2  #a6e3a1
color10 #a6e3a1
# Yellow
color3  #f9e2af
color11 #f9e2af
# Blue
color4  #89b4fa
color12 #89b4fa
# Magenta
color5  #f5c2e7
color13 #f5c2e7
# Cyan
color6  #94e2d5
color14 #94e2d5
# White
color7  #bac2de
color15 #a6adc8

selection_foreground #1e1e2e
selection_background #f5e0dc
cursor              #f5e0dc
cursor_text_color   #1e1e2e

# ─── Background Opacity & Blur ───────────────────────────────────
background_opacity 0.92
dynamic_background_opacity yes
background_blur 0

# ─── Shell Integration ───────────────────────────────────────────
shell_integration enabled

# ─── Keyboard Shortcuts ──────────────────────────────────────────

# Window management
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+n     new_os_window_with_cwd
map f4               launch --location=split --cwd=current

# Tab management
map ctrl+shift+t     new_tab_with_cwd
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab
map ctrl+shift+.     move_tab_forward
map ctrl+shift+,     move_tab_backward
map ctrl+shift+alt+t set_tab_title

# Layout switching
map ctrl+shift+l     next_layout

# Font size
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+0     change_font_size all 0

# Opacity control
map ctrl+shift+a>m   set_background_opacity +0.05
map ctrl+shift+a>l   set_background_opacity -0.05
map ctrl+shift+a>1   set_background_opacity 1
map ctrl+shift+a>d   set_background_opacity default

# Window navigation (vim-style)
map ctrl+shift+h     neighboring_window left
map ctrl+shift+j     neighboring_window down
map ctrl+shift+k     neighboring_window up
map ctrl+shift+l     neighboring_window right

# Scrollback
map ctrl+shift+page_up   scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home      scroll_home
map ctrl+shift+end       scroll_end
map ctrl+shift+s         show_scrollback
map ctrl+shift+g         show_last_command_output

# Hints: open visible file paths in editor
map ctrl+shift+p>f   kitten hints --type path --program -
map ctrl+shift+p>o   kitten hints --type path

# Quick open editor in current dir
# map f2               launch --cwd=current --type=tab
